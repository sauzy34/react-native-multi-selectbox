name: CI

on:
  push:
    branches: [master, main, chore/expo-monorepo-migration]
  pull_request:
    branches: [master, main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Do not set `version` here — package.json `packageManager` already pins pnpm@10.33.0.
      # Setting both makes pnpm/action-setup@v4 fail with "Multiple versions of pnpm specified".
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm test:ci

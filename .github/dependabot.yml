# Root-only updates so Dependabot rewrites pnpm-lock.yaml with workspace manifests.
# Nested package directories cause package.json-only PRs and --frozen-lockfile CI failures.
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # Prefer intentional upgrades for platform / tooling majors.
    ignore:
      - dependency-name: typescript
        update-types: ['version-update:semver-major']
      - dependency-name: eslint
        update-types: ['version-update:semver-major']
      - dependency-name: '@eslint/js'
        update-types: ['version-update:semver-major']
      - dependency-name: expo
        update-types: ['version-update:semver-major']
      - dependency-name: react-native
        update-types: ['version-update:semver-major']
      - dependency-name: '@react-native/*'
        update-types: ['version-update:semver-major']
      - dependency-name: jest
        update-types: ['version-update:semver-major']
      - dependency-name: '@types/jest'
        update-types: ['version-update:semver-major']
      - dependency-name: babel-jest
        update-types: ['version-update:semver-major']
    groups:
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - 'react-test-renderer'
      react-native-tooling:
        patterns:
          - 'react-native'
          - '@react-native/*'
      eslint-stack:
        patterns:
          - 'eslint'
          - '@eslint/*'
          - 'eslint-*'
          - 'typescript-eslint'
          - 'globals'
      testing:
        patterns:
          - 'jest'
          - '@types/jest'
          - 'babel-jest'
          - '@testing-library/*'
      babel:
        patterns:
          - '@babel/*'
      typescript:
        patterns:
          - 'typescript'
          - '@types/react'
      prettier:
        patterns:
          - 'prettier'
          - 'eslint-config-prettier'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    groups:
      github-actions:
        patterns:
          - '*'
